name: بناء تطبيق أندرويد (APK)

# يعمل هذا تلقائيًا عند رفع الكود إلى GitHub، ويبني ملف APK جاهزًا للتحميل من
# تبويب Actions ← اختر آخر تشغيل ← Artifacts، دون الحاجة لتثبيت Android Studio.
on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: سحب الكود
        uses: actions/checkout@v4

      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: إعداد JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: إعداد Android SDK
        uses: android-actions/setup-android@v3

      - name: تثبيت اعتماديات npm
        run: npm install

      - name: مزامنة مشروع Capacitor
        run: npx cap sync android

      - name: منح صلاحية التنفيذ لـ gradlew
        run: chmod +x android/gradlew

      - name: بناء APK (Debug)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: رفع APK كمخرج (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: huawei-hilink-dashboard-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
